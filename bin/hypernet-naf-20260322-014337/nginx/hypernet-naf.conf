server {
    listen 443 ssl;
    server_name naf.hypernet.com.au;

    ssl_certificate /etc/letsencrypt/live/naf.hypernet.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naf.hypernet.com.au/privkey.pem;

    location / {
        proxy_pass http://hypernet-naf-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name naf.hypernet.com.au;
    return 301 https://$host$request_uri;
}
