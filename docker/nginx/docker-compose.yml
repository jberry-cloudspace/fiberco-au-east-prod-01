services:
  nginx:
    image: nginx:alpine
    container_name: fiberco-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
    networks:
      - fiberco-internal

networks:
  fiberco-internal:
    external: true
