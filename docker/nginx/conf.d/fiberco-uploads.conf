# FiberCo Uploads — uploads.fiberco.com.au
# IP-restricted to Hypernet subnet only

server {
    listen 80;
    server_name uploads.fiberco.com.au;

    # ACME challenge for Let's Encrypt (no IP restriction)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # IP whitelist — Hypernet subnet (public + internal NAT)
        allow 165.101.9.0/24;
        allow 10.0.1.0/24;
        deny all;

        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name uploads.fiberco.com.au;

    ssl_certificate /etc/letsencrypt/live/fiberco.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fiberco.com.au/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Upload size limit (50MB)
    client_max_body_size 50m;

    resolver 127.0.0.11 valid=10s;
    set $upstream_uploads fiberco-uploads-app:5000;

    location / {
        # IP whitelist — Hypernet subnet (public + internal NAT)
        allow 165.101.9.0/24;
        allow 10.0.1.0/24;
        deny all;

        proxy_pass http://$upstream_uploads;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for large uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
